# Render Blueprint: ELETTRO Sales Intelligence API
# Deploy: Connect this repo at render.com → New → Blueprint → select this repo
# Then add DATABASE_URL in the service Environment tab.

services:
  - type: web
    name: elettro-api
    runtime: python
    # No rootDir: run from repo root so start script can cd into backend
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: sh start-backend.sh
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.9"
